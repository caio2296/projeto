<table mat-table [dataSource]="grid" class="mat-elevation-z8">

  <!-- ===================================== -->
  <!-- 🔥 COLUNAS PRINCIPAIS -->
  <!-- ===================================== -->

  <ng-container *ngFor="let column of allColumns"
                [matColumnDef]="column">

    <!-- HEADER PRINCIPAL -->
    <th mat-header-cell
        *matHeaderCellDef

        [attr.colspan]="getColSpan(column)"
        [style.text-align]="'center'">

       {{
    column === 'rowHeader' ||
    column.startsWith('__EMPTY__')
      ? ''
      : column
  }}


    </th>

    <!-- CELULAS -->
    <td mat-cell
        class="rowHeaderCell"
        *matCellDef="let element">

      <!-- COLUNA HIERARQUICA -->
      <ng-container *ngIf="column === 'rowHeader'; else valorColuna">

        <div class="cell-content">

          <span [style.padding-left.px]="(element.level || 0) * 20">

            {{ element.rowHeader }}

          </span>

          <button mat-icon-button
                  class="btn-expand"
                  *ngIf="hasChildren(element, grid)"
                  (click)="toggle(element)">

            <mat-icon>
              {{ element.expanded ? 'remove_circle' : 'add_circle' }}
            </mat-icon>

          </button>

        </div>

      </ng-container>

      <!-- OUTRAS COLUNAS -->
      <ng-template #valorColuna>

     <ng-container *ngIf="element[column] !== '-'; else texto">

     
    <button
      mat-button
      color="primary"
      (click)="abrirModal(column, element, $event)">
      {{ element[column] }}
    </button>

  </ng-container>

  <ng-template #texto>
    {{ element[column] }}
  </ng-template>   


      </ng-template>

    </td>

  </ng-container>



<ng-container *ngFor="let header of headerRows">

  <tr mat-header-row *matHeaderRowDef="getHeaderNames(header)"></tr>

</ng-container>

  <!-- ===================================== -->
  <!-- 🔥 DADOS -->
  <!-- ===================================== -->

  <tr mat-row
    *matRowDef="let row; columns: subHeaderColumnsMax;"
    [style.display]="row.visible ? '' : 'none'">
</tr>

</table>
