<h1>Dashboard</h1>

<app-label-data></app-label-data>

<h2>Filtros Select</h2>
<div class="filters-container">
  <app-filtros
    *ngFor="let filtro of this.dashboardFilterService.filtrosPorTipo['select']; trackBy: this.dashboardFilterService.trackFiltro"
    [ctrls]="filtro">
  </app-filtros>
</div>

<h2>Filtros Imagens</h2>
<div class="filters-container">
  <app-filtros
    *ngFor="let filtro of this.dashboardFilterService.filtrosPorTipo['img']; trackBy: this.dashboardFilterService.trackFiltro"
    [ctrls]="filtro">
  </app-filtros>
</div>

<h2>Filtros Multi Select</h2>
<div class="filters-container">
  <app-filtros
    *ngFor="let filtro of this.dashboardFilterService.filtrosPorTipo['multiselect']; trackBy: this.dashboardFilterService.trackFiltro"
    [ctrls]="filtro">
  </app-filtros>
</div>

<h2>Filtros Checkout</h2>
<div class="filters-container">
  <app-filtros
    *ngFor="let filtro of this.dashboardFilterService.filtrosPorTipo['chk']; trackBy: this.dashboardFilterService.trackFiltro"
    [ctrls]="filtro">
  </app-filtros>
</div>

<h2>Filtros Button set</h2>
<div class="filters-container">
  <app-filtros
    *ngFor="let filtro of this.dashboardFilterService.filtrosPorTipo['buttonset']; trackBy: this.dashboardFilterService.trackFiltro"
    [ctrls]="filtro">
  </app-filtros>
</div>

<h2>Filtros Button</h2>
<div class="filters-container">
  <app-filtros
    *ngFor="let filtro of this.dashboardFilterService.filtrosPorTipo['btn']; trackBy: this.dashboardFilterService.trackFiltro"
    [ctrls]="filtro">
  </app-filtros>
</div>

<div *ngFor="let tabela of this.dashboardTabelaService.tabelasProcessadas">

  <h2>{{ tabela.titulo }}</h2>

  <app-tabela 
    [grid]="tabela.grid"
    [displayedColumns]="tabela.displayedColumns"
    [ColsLevelRepetMax] = "tabela.ColsLevelRepetMax"
    [colTree]="tabela.colTree"
    [headerRowsPorNivel]= "tabela.headerRowsPorNivel"
    >
  </app-tabela>

</div>

<!-- 🔥 Você pode colocar qualquer coisa aqui -->
<app-grafico [mode]="'scatterplot'"></app-grafico>
